<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:transparent; font-family:monospace; }
  #container { position:relative; width:100%; }
  video {
    width:100%; display:block; border-radius:10px;
    background:#0a0a1a;
    transform: scaleX(-1);  /* mirror like selfie cam */
  }
  #badge {
    position:absolute; top:8px; left:8px;
    background:rgba(0,0,0,0.65);
    border:1px solid rgba(50,205,50,0.4);
    color:#32CD32; padding:3px 10px;
    border-radius:20px; font-size:11px;
    display:flex; align-items:center; gap:5px;
  }
  #dot { width:7px; height:7px; border-radius:50%; background:#32CD32;
         animation: pulse 1s infinite; display:inline-block; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  #err { padding:16px; color:#DC143C; font-size:13px; display:none; }
  canvas { display:none; }
</style>
</head>
<body>
<div id="container">
  <video id="v" autoplay playsinline muted></video>
  <div id="badge"><span id="dot"></span><span id="lbl">STARTING</span></div>
</div>
<canvas id="c"></canvas>
<div id="err"></div>
<script>
(function(){
  var v   = document.getElementById('v');
  var c   = document.getElementById('c');
  var x   = c.getContext('2d');
  var lbl = document.getElementById('lbl');
  var err = document.getElementById('err');
  var dot = document.getElementById('dot');
  var frameN = 0;
  var W = window.parent;

  function post(obj) { W.postMessage(obj, '*'); }

  function ready()  { post({isStreamlitMessage:true, type:'streamlit:componentReady', apiVersion:1}); }
  function setH(h)  { post({isStreamlitMessage:true, type:'streamlit:setFrameHeight', height:h}); }
  function setValue(val) { post({isStreamlitMessage:true, type:'streamlit:setComponentValue', value:val}); }

  function adjustHeight() {
    var h = v.getBoundingClientRect().height;
    if(!h && v.videoHeight && v.videoWidth) {
      h = Math.round(v.videoHeight * (window.innerWidth / v.videoWidth));
    }
    if(h > 0) setH(h + 4);
  }

  function capture() {
    if(v.readyState < 2) return;
    c.width  = v.videoWidth;
    c.height = v.videoHeight;
    // mirror the canvas so it matches the mirrored video display
    x.save();
    x.translate(c.width, 0);
    x.scale(-1, 1);
    x.drawImage(v, 0, 0);
    x.restore();
    var data = c.toDataURL('image/jpeg', 0.78);
    setValue(data);
    lbl.textContent = 'LIVE #' + (++frameN);
  }

  ready();
  setH(420);

  navigator.mediaDevices.getUserMedia({
    video: { width:{ideal:640}, height:{ideal:480}, facingMode:'user' },
    audio: false
  }).then(function(stream){
    v.srcObject = stream;
    v.addEventListener('loadedmetadata', function(){
      adjustHeight();
      setInterval(capture, 350);   // ~2.8 FPS  (cloud-friendly)
    });
    lbl.textContent = 'LIVE';
  }).catch(function(e){
    dot.style.background = '#DC143C';
    lbl.textContent = 'CAMERA DENIED';
    err.style.display = 'block';
    err.textContent = 'Camera access denied: ' + e.message +
                      '. Click the camera icon in your browser address bar.';
    setH(60);
    setValue(null);
  });
})();
</script>
</body>
</html>
